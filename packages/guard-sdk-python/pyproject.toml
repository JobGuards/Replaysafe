[tool.poetry]
name = "replaysafe"
version = "1.0.0"
description = "Python SDK for Replaysafe agent execution memory control plane"
authors = ["Replaysafe Team"]
packages = [
    { include = "replaysafe" }
]

[tool.poetry.dependencies]
python = "^3.9"
requests = "^2.31.0"

[tool.poetry.group.dev.dependencies]
pytest = "^8.0.0"
responses = "^0.25.0"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"
